<!DOCTYPE html>
<html lang="en">
<head>
<!-- ============================================================
     SLAB LEDGER v2 — personal graded-card inventory
     One single file: HTML + CSS + JavaScript.
     Fully offline-friendly after loading: photos are processed
     locally on your phone. Nothing is ever uploaded anywhere.

     How scanning works (all local, in this order):
       1) Look for a QR code / barcode on the label photo
          (newer PSA labels have a QR that contains the cert
          number) — this is the most reliable route.
       2) Run OCR (Tesseract) on the same photo to read the
          printed text: cert number, grade, and card name lines.
       3) Anything it can't read, you can type or edit by hand.
     ============================================================ -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Slab Ledger — Card Inventory</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<!-- ZXing: trusted open-source QR / barcode reader (runs locally) -->
<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
<!-- Tesseract.js: trusted open-source OCR engine (runs locally) -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
/* ============ 1. DESIGN TOKENS ============ */
:root{
  --bg:        #0F1626;
  --surface:   #1B2436;
  --surface-2: #232E44;
  --line:      #2E3A54;
  --text:      #EDF1F8;
  --muted:     #93A0B8;
  --label-red: #D6404A;
  --grade-gold:#E9B949;
  --ok:        #4CC38A;
  --radius: 14px;
  --font-display: "Barlow Condensed", sans-serif;
  --font-body:    "Inter", system-ui, sans-serif;
  --font-mono:    "IBM Plex Mono", monospace;
}

/* ============ 2. BASE LAYOUT (mobile-first) ============ */
*{ box-sizing:border-box; margin:0; padding:0; }
html{ -webkit-text-size-adjust:100%; }
body{
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.5;
  padding: max(14px, env(safe-area-inset-top)) 14px calc(24px + env(safe-area-inset-bottom));
  max-width: 560px;
  margin-inline: auto;
}

header{
  background: var(--label-red);
  border-radius: var(--radius) var(--radius) 4px 4px;
  padding: 12px 16px 10px;
  display:flex; align-items:baseline; justify-content:space-between;
  margin-bottom: 14px;
}
header h1{
  font-family: var(--font-display);
  font-size: 28px; font-weight: 700;
  letter-spacing: .04em; text-transform: uppercase;
}
header .count-chip{
  font-family: var(--font-mono);
  font-size: 13px; font-weight: 600;
  background: rgba(0,0,0,.25);
  padding: 3px 10px; border-radius: 99px;
}

section{
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 14px;
}
section > h2{
  font-family: var(--font-display);
  font-size: 20px; font-weight: 600;
  letter-spacing: .05em; text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}

/* ============ 3. FORM CONTROLS ============ */
label{
  display:block;
  font-size: 13px; font-weight: 600;
  color: var(--muted);
  margin: 12px 0 5px;
}
input[type="text"]{
  width:100%;
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: 10px;
  color: var(--text);
  font-size: 16px;
  padding: 12px;
}
input[type="text"]:focus{ outline: 2px solid var(--grade-gold); outline-offset: 1px; }
#certNumber{ font-family: var(--font-mono); letter-spacing:.06em; }

button{
  font-family: var(--font-body);
  font-size: 15px; font-weight: 600;
  border: none; border-radius: 10px;
  padding: 13px 14px;
  width: 100%;
  cursor: pointer;
  margin-top: 12px;
  transition: transform .06s ease;
}
button:active{ transform: scale(.98); }
button:focus-visible{ outline: 2px solid var(--grade-gold); outline-offset: 2px; }
.btn-camera { background: var(--surface-2); color: var(--text); border:1px dashed var(--muted); }
.btn-add    { background: var(--grade-gold); color: #1A1405; }
.btn-export { background: var(--ok); color: #06281A; }
.btn-clear  { background: transparent; color: var(--label-red); border:1px solid var(--label-red); }
button:disabled{ opacity:.5; cursor:wait; }

#photoInput{ display:none; }

.status{
  font-size: 13px; color: var(--muted);
  margin-top: 8px; min-height: 1.2em;
}
.status.ok{ color: var(--ok); }
.status.err{ color: var(--label-red); }

.hint{
  font-size: 12px; color: var(--muted);
  margin-top: 6px;
}

/* ============ 4. INVENTORY LIST ============ */
#inventoryList{ list-style:none; display:grid; gap:10px; }
.slab{
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: 10px;
  overflow: hidden;
}
.slab-strip{
  background: var(--label-red);
  display:flex; justify-content:space-between; align-items:center;
  padding: 6px 12px;
}
.slab-strip .cert{
  font-family: var(--font-mono);
  font-size: 13px; font-weight: 600;
}
.slab-strip .grade{
  font-family: var(--font-display);
  font-size: 16px; font-weight: 700; letter-spacing:.04em;
  color: var(--grade-gold);
  text-transform: uppercase;
}
.slab-body{
  display:flex; justify-content:space-between; align-items:center;
  gap:10px; padding: 10px 12px;
}
.slab-body .name{ font-weight: 600; font-size: 15px; overflow-wrap:anywhere; }
.slab-body .date{ font-size: 12px; color: var(--muted); white-space:nowrap; }
.slab-body .del{
  width:auto; margin:0; padding: 6px 10px;
  background: transparent; color: var(--muted);
  border: 1px solid var(--line); border-radius: 8px;
  font-size: 12px;
}
.empty{
  text-align:center; color: var(--muted);
  font-size: 14px; padding: 18px 8px;
}

@media (prefers-reduced-motion: reduce){
  *{ transition:none !important; }
}
</style>
</head>
<body>

<header>
  <h1>Slab Ledger</h1>
  <span class="count-chip" id="countChip">0 cards</span>
</header>

<!-- ================= CARD COMPONENT 1: ADD NEW ITEM ================= -->
<section aria-labelledby="addTitle">
  <h2 id="addTitle">Add new item</h2>

  <input type="file" id="photoInput" accept="image/*" capture="environment">
  <button type="button" class="btn-camera" id="scanBtn">📷 Scan slab label</button>
  <p class="hint">Fill the frame with just the label. If your slab has a QR code, make sure it's in the shot — it's the most reliable way to read the cert.</p>
  <p class="status" id="scanStatus" role="status"></p>

  <label for="certNumber">Cert number</label>
  <input type="text" id="certNumber" inputmode="numeric" autocomplete="off"
         placeholder="8–10 digit certificate number">

  <label for="cardName">Card name</label>
  <input type="text" id="cardName" autocomplete="off" placeholder="e.g. 1999 Pokémon Game Charizard #4">

  <label for="cardGrade">Grade</label>
  <input type="text" id="cardGrade" autocomplete="off" placeholder="e.g. GEM MT 10">

  <button type="button" class="btn-add" id="addBtn">＋ Add to inventory</button>
</section>

<!-- ================= CARD COMPONENT 2: LIVE INVENTORY ================= -->
<section aria-labelledby="invTitle">
  <h2 id="invTitle">Inventory</h2>
  <ul id="inventoryList"></ul>

  <button type="button" class="btn-export" id="exportBtn">⬇ Export to spreadsheet (CSV)</button>
  <button type="button" class="btn-clear" id="clearBtn">Clear all data</button>
</section>

<script>
/* =====================================================================
   SLAB LEDGER v2 — JavaScript
   Sections:
     A. Local storage (save/load)
     B. Rendering the inventory list
     C. Adding & deleting cards
     D. Photo scan pipeline: QR/barcode first, then OCR
     E. Label-text parsing (cert / grade / name guesses)
     F. CSV export
     G. Clear data
   ===================================================================== */

// ---- A. LOCAL STORAGE -------------------------------------------------
const STORAGE_KEY = "psa_inventory";

function loadInventory() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch (e) {
    return [];
  }
}

function saveInventory(items) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
}

let inventory = loadInventory();

const $ = (id) => document.getElementById(id);
const listEl     = $("inventoryList");
const countChip  = $("countChip");
const scanStatus = $("scanStatus");

// ---- B. RENDERING ------------------------------------------------------
// User data is always inserted with textContent (never innerHTML),
// which keeps the page safe from script injection.
function render() {
  listEl.innerHTML = "";
  countChip.textContent = inventory.length + (inventory.length === 1 ? " card" : " cards");

  if (inventory.length === 0) {
    const li = document.createElement("li");
    li.className = "empty";
    li.textContent = "No cards logged yet. Scan a slab above to get started.";
    listEl.appendChild(li);
    return;
  }

  inventory.forEach((card, index) => {
    const li = document.createElement("li");
    li.className = "slab";

    const strip = document.createElement("div");
    strip.className = "slab-strip";
    const cert = document.createElement("span");
    cert.className = "cert";
    cert.textContent = "#" + card.cert;
    const grade = document.createElement("span");
    grade.className = "grade";
    grade.textContent = card.grade || "—";
    strip.append(cert, grade);

    const body = document.createElement("div");
    body.className = "slab-body";
    const name = document.createElement("span");
    name.className = "name";
    name.textContent = card.name || "(unnamed card)";
    const date = document.createElement("span");
    date.className = "date";
    date.textContent = card.added;
    const del = document.createElement("button");
    del.className = "del";
    del.type = "button";
    del.textContent = "Delete";
    del.addEventListener("click", () => {
      if (confirm("Delete this card from your inventory?")) {
        inventory.splice(index, 1);
        saveInventory(inventory);
        render();
      }
    });
    body.append(name, date, del);

    li.append(strip, body);
    listEl.appendChild(li);
  });
}

// ---- C. ADDING A CARD --------------------------------------------------
$("addBtn").addEventListener("click", () => {
  const cert  = $("certNumber").value.trim();
  const name  = $("cardName").value.trim();
  const grade = $("cardGrade").value.trim();

  if (!cert) {
    alert("Please enter (or scan) a cert number first.");
    return;
  }

  inventory.unshift({
    cert,
    name,
    grade,
    added: new Date().toLocaleDateString()
  });
  saveInventory(inventory);
  render();

  $("certNumber").value = "";
  $("cardName").value = "";
  $("cardGrade").value = "";
  scanStatus.textContent = "";
  scanStatus.className = "status";
});

// ---- D. PHOTO SCAN PIPELINE ---------------------------------------------
// Step 1: try to decode a QR code or barcode with ZXing.
//         Newer PSA labels carry a QR whose content includes the cert
//         number — decoding it is near-instant and very reliable.
// Step 2: run OCR on the same photo to read the printed label text,
//         which lets us guess the grade and card name (and the cert
//         too, if there was no QR).
// Both steps happen entirely on your phone.

$("scanBtn").addEventListener("click", () => $("photoInput").click());

$("photoInput").addEventListener("change", async (event) => {
  const file = event.target.files[0];
  if (!file) return;

  const scanBtn = $("scanBtn");
  scanBtn.disabled = true;
  scanStatus.className = "status";

  // An object URL lets both libraries read the photo straight from memory
  const photoURL = URL.createObjectURL(file);

  let certFromCode = "";

  // ---------- Step 1: QR / barcode ----------
  try {
    scanStatus.textContent = "Checking for a QR code or barcode…";
    const reader = new ZXing.BrowserMultiFormatReader();
    const result = await reader.decodeFromImageUrl(photoURL);
    // The QR usually contains a web address ending in the cert number,
    // so we just pull the first 8–10 digit run out of whatever it says.
    const digits = (result.getText() || "").match(/\d{8,10}/);
    if (digits) {
      certFromCode = digits[0];
      $("certNumber").value = certFromCode;
      scanStatus.className = "status ok";
      scanStatus.textContent = "QR read — cert #" + certFromCode + ". Reading label text…";
    }
  } catch (err) {
    // No code found in the photo — perfectly normal on older labels.
    // We silently continue to OCR.
  }

  // ---------- Step 2: OCR the label text ----------
  try {
    if (!certFromCode) scanStatus.textContent = "No QR found — reading label text instead…";

    const result = await Tesseract.recognize(photoURL, "eng", {
      logger: (m) => {
        if (m.status === "recognizing text") {
          scanStatus.textContent = "Reading label text… " + Math.round(m.progress * 100) + "%";
        }
      }
    });

    const parsed = parseLabelText(result.data.text, certFromCode);

    // Only fill fields we actually found, and never overwrite the
    // more-reliable QR cert with an OCR guess.
    if (!certFromCode && parsed.cert) $("certNumber").value = parsed.cert;
    if (parsed.grade) $("cardGrade").value = parsed.grade;
    if (parsed.name)  $("cardName").value  = parsed.name;

    const gotCert = certFromCode || parsed.cert;
    if (gotCert || parsed.grade || parsed.name) {
      scanStatus.className = "status ok";
      scanStatus.textContent =
        "Filled in: " +
        [gotCert ? "cert" : "", parsed.grade ? "grade" : "", parsed.name ? "name" : ""]
          .filter(Boolean).join(", ") +
        ". Double-check against the label, then add.";
    } else {
      scanStatus.className = "status err";
      scanStatus.textContent = "Couldn't read the label. Try a closer, well-lit, straight-on photo — or type the details below.";
    }
  } catch (err) {
    if (certFromCode) {
      scanStatus.className = "status ok";
      scanStatus.textContent = "Cert #" + certFromCode + " read from QR. Type the name and grade below.";
    } else {
      scanStatus.className = "status err";
      scanStatus.textContent = "Scan failed to run. Please type the details manually.";
    }
  } finally {
    URL.revokeObjectURL(photoURL);
    scanBtn.disabled = false;
    event.target.value = ""; // allow re-scanning the same photo
  }
});

// ---- E. LABEL-TEXT PARSING ------------------------------------------------
// Takes the raw OCR text of a PSA label and tries to pick out:
//   cert  — an 8–10 digit run of numbers
//   grade — standard PSA wording, e.g. "GEM MT 10", "MINT 9", "NM-MT 8"
//   name  — the remaining descriptive lines (year / set / player)
// These are best-effort guesses; the form stays editable so you can fix
// anything the camera misread.
function parseLabelText(rawText, knownCert) {
  const out = { cert: "", grade: "", name: "" };

  // Cert: look for 8–10 digits, tolerating OCR-inserted spaces
  const certMatch = rawText.match(/\b\d{8,10}\b/) ||
                    rawText.replace(/[ \t]/g, "").match(/\d{8,10}/);
  if (certMatch) out.cert = certMatch[0];

  // Grade: match PSA's standard grade wording (longest names first so
  // e.g. "NM-MT" wins over plain "NM"). Also catches "AUTHENTIC".
  const gradeRe = /\b(GEM\s*MT|GEM\s*MINT|NM\s*-?\s*MT|EX\s*-?\s*MT|VG\s*-?\s*EX|MINT|NM|EX|VG|GOOD|FR|PR|AUTHENTIC)\s*(10|[1-9](?:\.5)?)?\b/i;
  const gradeMatch = rawText.match(gradeRe);
  if (gradeMatch) {
    out.grade = gradeMatch[0].replace(/\s+/g, " ").trim().toUpperCase();
  }

  // Name: keep label lines that are NOT the cert, NOT the grade, and
  // look like real words (PSA prints year/set/player on the left side).
  const certToSkip = knownCert || out.cert;
  const lines = rawText
    .split("\n")
    .map((line) => line.replace(/\s+/g, " ").trim())
    .filter((line) => {
      if (line.length < 3) return false;                     // noise
      if (certToSkip && line.includes(certToSkip)) return false;
      if (out.grade && line.toUpperCase().includes(out.grade)) return false;
      if (/^[\d\s.#-]+$/.test(line)) return false;           // digits only
      if (/^PSA$/i.test(line)) return false;                 // the logo text
      const letters = (line.match(/[A-Za-z]/g) || []).length;
      return letters >= 3;                                   // must have words
    });

  // The first few surviving lines are almost always year/set/player
  out.name = lines.slice(0, 3).join(" ").trim();

  return out;
}

// ---- F. EXPORT TO CSV ----------------------------------------------------
// Every value is wrapped in quotes with inner quotes doubled — the
// standard CSV escaping rule — so commas or quotes in card names can
// never break your spreadsheet columns.
function csvCell(value) {
  return '"' + String(value ?? "").replace(/"/g, '""') + '"';
}

$("exportBtn").addEventListener("click", () => {
  if (inventory.length === 0) {
    alert("Nothing to export yet — add a card first.");
    return;
  }

  const header = ["Cert Number", "Card Name", "Grade", "Date Added"];
  const rows = inventory.map((c) =>
    [c.cert, c.name, c.grade, c.added].map(csvCell).join(",")
  );
  const csv = header.map(csvCell).join(",") + "\r\n" + rows.join("\r\n");

  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "card-inventory-" + new Date().toISOString().slice(0, 10) + ".csv";
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
});

// ---- G. CLEAR DATA ---------------------------------------------------------
$("clearBtn").addEventListener("click", () => {
  if (inventory.length === 0) return;
  const sure = confirm(
    "This permanently deletes all " + inventory.length +
    " logged cards from this device.\n\nTip: export a CSV first!\n\nClear everything?"
  );
  if (sure) {
    inventory = [];
    saveInventory(inventory);
    render();
  }
});

// ---- Initial paint on page load -------------------------------------------
render();
</script>
</body>
</html>
