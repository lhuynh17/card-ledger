<!DOCTYPE html>
<html lang="en">
<head>
<!-- ============================================================
     SLAB LEDGER v4 — personal graded-card inventory
     One single file: HTML + CSS + JavaScript.
     Everything runs locally on your phone. Nothing is uploaded,
     and this app does NOT fetch or parse any external website.

     Workflow for logging a card:
       1) SCAN QR (live camera) — PSA slabs made 2020+ have a QR on
          the label. The live camera reads it instantly and fills
          the cert number for you.
       2) OPEN CERT PAGE — tap to open PSA's own public cert page in
          a new browser tab. YOU read the card name and grade off
          the page with your own eyes and type them into the two
          fields. (This is just you doing a normal manual lookup —
          the app never reads that page for you.)
       3) READ PHOTO (OCR) — optional. For older pre-2020 slabs with
          no QR, or if you'd rather not open a tab, take a still
          photo and the app attempts to read the label text locally.
          OCR is best-effort and often imperfect, so every field
          stays editable before you tap Add.
     ============================================================ -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Slab Ledger — Card Inventory</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<!-- ZXing: trusted open-source QR / barcode reader (runs locally) -->
<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
<!-- Tesseract.js: trusted open-source OCR engine (runs locally) -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<!-- ExcelJS: builds real .xlsx files (with embedded photos) in the browser -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>

<style>
/* ============ 1. DESIGN TOKENS ============ */
:root{
  --bg:        #0F1626;
  --surface:   #1B2436;
  --surface-2: #232E44;
  --line:      #2E3A54;
  --text:      #EDF1F8;
  --muted:     #93A0B8;
  --label-red: #D6404A;
  --grade-gold:#E9B949;
  --ok:        #4CC38A;
  --radius: 14px;
  --font-display: "Barlow Condensed", sans-serif;
  --font-body:    "Inter", system-ui, sans-serif;
  --font-mono:    "IBM Plex Mono", monospace;
}

/* ============ 2. BASE LAYOUT (mobile-first) ============ */
*{ box-sizing:border-box; margin:0; padding:0; }
html{ -webkit-text-size-adjust:100%; }
body{
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.5;
  padding: max(14px, env(safe-area-inset-top)) 14px calc(24px + env(safe-area-inset-bottom));
  max-width: 560px;
  margin-inline: auto;
}

header{
  background: var(--label-red);
  border-radius: var(--radius) var(--radius) 4px 4px;
  padding: 12px 16px 10px;
  display:flex; align-items:baseline; justify-content:space-between;
  margin-bottom: 14px;
}
header h1{
  font-family: var(--font-display);
  font-size: 28px; font-weight: 700;
  letter-spacing: .04em; text-transform: uppercase;
}
header .count-chip{
  font-family: var(--font-mono);
  font-size: 13px; font-weight: 600;
  background: rgba(0,0,0,.25);
  padding: 3px 10px; border-radius: 99px;
}

section{
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 14px;
}
section > h2{
  font-family: var(--font-display);
  font-size: 20px; font-weight: 600;
  letter-spacing: .05em; text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}

/* ============ 3. FORM CONTROLS ============ */
label{
  display:block;
  font-size: 13px; font-weight: 600;
  color: var(--muted);
  margin: 12px 0 5px;
}
input[type="text"]{
  width:100%;
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: 10px;
  color: var(--text);
  font-size: 16px;
  padding: 12px;
}
input[type="text"]:focus{ outline: 2px solid var(--grade-gold); outline-offset: 1px; }
#certNumber{ font-family: var(--font-mono); letter-spacing:.06em; }

/* A row that puts a text field and its Paste button side by side */
.field-row{ display:flex; gap:8px; align-items:stretch; }
.field-row input[type="text"]{ flex:1 1 auto; }
.btn-paste{
  flex:0 0 auto; width:auto; margin:0;
  background: var(--surface-2); color: var(--text);
  border:1px solid var(--line); border-radius:10px;
  padding: 0 14px; font-size: 14px;
  white-space: nowrap;
}

button{
  font-family: var(--font-body);
  font-size: 15px; font-weight: 600;
  border: none; border-radius: 10px;
  padding: 13px 14px;
  width: 100%;
  cursor: pointer;
  margin-top: 12px;
  transition: transform .06s ease;
}
button:active{ transform: scale(.98); }
button:focus-visible{ outline: 2px solid var(--grade-gold); outline-offset: 2px; }
.btn-scan   { background: var(--grade-gold); color: #1A1405; }
.btn-lookup { background: #2C3B5C; color: var(--text); }
.btn-photo  { background: var(--surface-2); color: var(--text); border:1px dashed var(--muted); }
.btn-add    { background: var(--grade-gold); color: #1A1405; }
.btn-export { background: var(--ok); color: #06281A; }
.btn-clear  { background: transparent; color: var(--label-red); border:1px solid var(--label-red); }
.btn-cancel { background: transparent; color: var(--muted); border:1px solid var(--line); }
button:disabled{ opacity:.5; cursor:wait; }

#photoInput{ display:none; }
#slabPhotoInput{ display:none; }

/* Preview of the slab photo for the card you're about to add */
#photoPreviewWrap{ display:none; margin-top:10px; align-items:center; gap:10px; }
#photoPreviewWrap.active{ display:flex; }
#photoPreview{
  width:64px; height:64px; object-fit:cover;
  border-radius:8px; border:1px solid var(--line);
}
#clearPhotoBtn{
  width:auto; margin:0; padding:6px 10px; font-size:12px;
  background:transparent; color:var(--muted);
  border:1px solid var(--line); border-radius:8px;
}

/* Live camera view — hidden until "Scan QR" is tapped */
#scannerWrap{ display:none; margin-top: 12px; }
#scannerWrap.active{ display:block; }
#video{
  width:100%;
  aspect-ratio: 4 / 3;
  background:#000;
  border-radius: 10px;
  object-fit: cover;
}
.scan-frame{
  position: relative;
}
/* A simple reticle overlay to help the user aim at the QR */
.scan-frame::after{
  content:"";
  position:absolute; inset: 18% 24%;
  border: 2px solid var(--grade-gold);
  border-radius: 8px;
  pointer-events:none;
}

.status{
  font-size: 13px; color: var(--muted);
  margin-top: 8px; min-height: 1.2em;
}
.status.ok{ color: var(--ok); }
.status.err{ color: var(--label-red); }

.hint{
  font-size: 12px; color: var(--muted);
  margin-top: 6px;
}

/* ============ 4. INVENTORY LIST ============ */
#inventoryList{ list-style:none; display:grid; gap:10px; }
.slab{
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: 10px;
  overflow: hidden;
}
.slab-strip{
  background: var(--label-red);
  display:flex; justify-content:space-between; align-items:center;
  padding: 6px 12px;
}
.slab-strip .cert{ font-family: var(--font-mono); font-size: 13px; font-weight: 600; }
/* Grade shown as a badge in the red strip.
   Under 10 = a clean gold-ringed token circle; a perfect 10 = a shiny
   metallic gold award medal with a glossy sheen. */
.grade-badge{
  flex:0 0 auto;
  display:inline-flex; align-items:center; justify-content:center;
  font-family: var(--font-display);
  font-weight:700; line-height:1; letter-spacing:.02em;
}
/* grades 1–9 (and half grades): token circle */
.grade-badge.num{
  width:34px; height:34px; border-radius:50%;
  font-size:17px;
  background: radial-gradient(circle at 30% 28%, #33415C, #202A3E);
  color: var(--grade-gold);
  border:1.5px solid var(--grade-gold);
  box-shadow: inset 0 1px 2px rgba(255,255,255,.14);
}
/* the coveted 10: glossy gold medal */
.grade-badge.ten{
  position:relative;
  width:38px; height:38px; border-radius:50%;
  font-size:17px; color:#3a2c05;
  text-shadow:0 1px 0 rgba(255,255,255,.45);
  background: radial-gradient(circle at 32% 26%,
              #FFF6D5 0%, #F4CF63 34%, #E4A72B 66%, #B87715 100%);
  border:1.5px solid #FFE9A8;
  box-shadow:
    0 0 0 2px rgba(233,185,73,.35),
    0 2px 6px rgba(0,0,0,.45),
    inset 0 1px 2px rgba(255,255,255,.85),
    inset 0 -2px 4px rgba(120,80,10,.5);
}
.grade-badge.ten::after{   /* glossy highlight */
  content:""; position:absolute; left:19%; top:11%; width:50%; height:32%;
  background: linear-gradient(180deg, rgba(255,255,255,.8), rgba(255,255,255,0));
  border-radius:50%; pointer-events:none;
}
/* non-numeric grades (e.g. AUTH): small pill */
.grade-badge.text{
  height:30px; padding:0 12px; border-radius:999px;
  font-family: var(--font-body); font-size:12px; font-weight:600;
  letter-spacing:.05em; text-transform:uppercase;
  background: var(--surface-2); color: var(--text);
  border:1px solid var(--line);
}
/* no grade yet */
.grade-badge.empty{
  width:34px; height:34px; border-radius:50%;
  background:transparent; color:var(--muted);
  border:1px dashed var(--line); font-size:16px;
}
.slab-body{
  display:flex; justify-content:space-between; align-items:center;
  gap:12px; padding: 10px 12px;
}
.slab-main{ flex:1 1 auto; min-width:0; }
.slab-body .name{ font-weight: 600; font-size: 15px; overflow-wrap:anywhere; }
.slab-body .meta{ font-size: 12px; color: var(--muted); margin-top:2px; }
/* Slab photo now sits on the RIGHT of the info */
.slab-thumb{
  width:64px; height:64px; object-fit:cover; flex:0 0 auto;
  border-radius:8px; border:1px solid var(--line);
}
/* Edit / Delete actions under the info */
.slab-actions{ display:flex; gap:8px; margin-top:9px; }
.act{
  width:auto; margin:0; padding:6px 12px; font-size:12px;
  border-radius:8px; background:transparent;
  border:1px solid var(--line); color:var(--muted);
}
.act.edit{ color: var(--grade-gold); border-color: rgba(233,185,73,.55); }

/* Inline edit form (shown when a card is being edited) */
.slab-edit{ padding: 12px 14px; }
.slab-edit h3{
  font-family: var(--font-display); font-size:16px; font-weight:600;
  letter-spacing:.05em; text-transform:uppercase; color:var(--muted);
  margin-bottom:4px;
}
.slab-edit label{ margin:10px 0 4px; }
.edit-photo{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:10px; }
.edit-thumb{
  width:56px; height:56px; object-fit:cover;
  border-radius:8px; border:1px solid var(--line);
}
.edit-actions{ display:flex; gap:10px; margin-top:14px; }
.edit-actions button{ flex:1; margin-top:0; }
.empty{
  text-align:center; color: var(--muted);
  font-size: 14px; padding: 18px 8px;
}

@media (prefers-reduced-motion: reduce){ *{ transition:none !important; } }
</style>
</head>
<body>

<header>
  <h1>Slab Ledger</h1>
  <span class="count-chip" id="countChip">0 cards</span>
</header>

<!-- ================= CARD COMPONENT 1: ADD NEW ITEM ================= -->
<section aria-labelledby="addTitle">
  <h2 id="addTitle">Add new item</h2>

  <!-- PRIMARY PATH: live QR scanner (best for 2020+ slabs) -->
  <button type="button" class="btn-scan" id="scanBtn">🎯 Scan QR (live camera)</button>

  <!-- The live camera view appears here when scanning is active -->
  <div id="scannerWrap">
    <div class="scan-frame">
      <video id="video" muted playsinline></video>
    </div>
    <button type="button" class="btn-cancel" id="cancelScanBtn">Stop camera</button>
  </div>

  <!-- MANUAL LOOKUP HELPER: opens PSA's own public cert page in a new
       tab so the user can read the name & grade and type them in.
       The app does not read the page — the person does. -->
  <button type="button" class="btn-lookup" id="lookupBtn">🔎 Open cert page (look up name &amp; grade)</button>

  <!-- OPTIONAL: still-photo OCR, mainly for older slabs with no QR -->
  <input type="file" id="photoInput" accept="image/*" capture="environment">
  <button type="button" class="btn-photo" id="photoBtn">📷 Read from photo (optional / older slabs)</button>

  <p class="hint">Fastest reliable flow: scan the QR → tap “Open cert page” → on PSA’s page long-press the card name and choose Copy → come back and tap “📋 Paste” next to the field. Repeat for the grade. (Photo/OCR is a rough fallback for slabs with no QR.)</p>
  <p class="status" id="scanStatus" role="status"></p>

  <label for="certNumber">Cert number</label>
  <input type="text" id="certNumber" inputmode="numeric" autocomplete="off">

  <label for="cardName">Card name</label>
  <div class="field-row">
    <input type="text" id="cardName" autocomplete="off">
    <button type="button" class="btn-paste" id="pasteNameBtn" title="Paste copied text into this field">📋 Paste</button>
  </div>

  <label for="cardGrade">Grade</label>
  <div class="field-row">
    <input type="text" id="cardGrade" autocomplete="off">
    <button type="button" class="btn-paste" id="pasteGradeBtn" title="Paste copied text into this field">📋 Paste</button>
  </div>

  <label for="cardPop">Pop</label>
  <div class="field-row">
    <input type="text" id="cardPop" inputmode="numeric" autocomplete="off">
    <button type="button" class="btn-paste" id="pastePopBtn" title="Paste copied text into this field">📋 Paste</button>
  </div>

  <label>Slab photo</label>
  <input type="file" id="slabPhotoInput" accept="image/*">
  <button type="button" class="btn-photo" id="slabPhotoBtn">📸 Add slab photo (take or upload)</button>
  <div id="photoPreviewWrap">
    <img id="photoPreview" alt="Slab photo preview">
    <button type="button" id="clearPhotoBtn">Remove photo</button>
  </div>

  <button type="button" class="btn-add" id="addBtn">＋ Add to inventory</button>
</section>

<!-- ================= CARD COMPONENT 2: LIVE INVENTORY ================= -->
<section aria-labelledby="invTitle">
  <h2 id="invTitle">Inventory</h2>
  <ul id="inventoryList"></ul>

  <button type="button" class="btn-export" id="exportBtn">⬇ Export data (CSV)</button>
  <button type="button" class="btn-export" id="exportXlsxBtn">🖼 Export with photos (Excel)</button>
  <button type="button" class="btn-clear" id="clearBtn">Clear all data</button>
</section>

<script>
/* =====================================================================
   SLAB LEDGER v7 — JavaScript
     A. Storage: IndexedDB (large capacity) + one-time migration
        from the old localStorage data so nothing is lost
     B. Rendering the inventory list
     C. Adding & deleting cards
     D. LIVE QR scanner (ZXing, camera video feed)
     E. Still-photo OCR (Tesseract) for grade/name & older slabs
     F. Label-text parsing
     G. CSV & Excel(+photos) export
     H. Clear data
   ===================================================================== */

// ---- A. STORAGE: INDEXEDDB -------------------------------------------------
// Cards live in IndexedDB, which allows far more room than localStorage
// (hundreds of MB+ instead of ~5 MB) — important once you store photos.
// We keep an in-memory copy in `inventory` for fast rendering/exporting,
// and mirror every change into IndexedDB so it persists between sessions.
const OLD_STORAGE_KEY = "psa_inventory";   // legacy localStorage key
const DB_NAME  = "slabLedger";
const DB_STORE = "cards";
let db = null;
let inventory = [];   // in-memory working copy, newest first; each has .id
let editingId = null; // id of the card currently being edited inline, or null

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(DB_STORE)) {
        // autoIncrement gives each card a unique, ever-increasing id;
        // higher id = added later, which we use to sort newest-first.
        d.createObjectStore(DB_STORE, { keyPath: "id", autoIncrement: true });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}

function dbAdd(card) {  // resolves to the new auto-assigned id
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, "readwrite");
    const req = tx.objectStore(DB_STORE).add(card);
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}

function dbDelete(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, "readwrite");
    tx.objectStore(DB_STORE).delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror    = () => reject(tx.error);
  });
}

function dbPut(card) {   // updates an existing card in place (matched by id)
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, "readwrite");
    tx.objectStore(DB_STORE).put(card);
    tx.oncomplete = () => resolve();
    tx.onerror    = () => reject(tx.error);
  });
}

function dbGetAll() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, "readonly");
    const req = tx.objectStore(DB_STORE).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror   = () => reject(req.error);
  });
}

function dbClear() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, "readwrite");
    tx.objectStore(DB_STORE).clear();
    tx.oncomplete = () => resolve();
    tx.onerror    = () => reject(tx.error);
  });
}

// One-time move of any cards saved by older versions (localStorage) into
// IndexedDB. Runs only when IndexedDB is still empty, then clears the old
// key so it never runs twice.
async function migrateFromLocalStorage() {
  let old = null;
  try { old = JSON.parse(localStorage.getItem(OLD_STORAGE_KEY)); } catch (e) {}
  if (Array.isArray(old) && old.length) {
    // old array is newest-first; insert oldest-first so ids stay chronological
    for (let i = old.length - 1; i >= 0; i--) {
      const c = { ...old[i] };
      delete c.id;              // let IndexedDB assign a fresh id
      await dbAdd(c);
    }
  }
  localStorage.removeItem(OLD_STORAGE_KEY);
}

const $ = (id) => document.getElementById(id);
const listEl     = $("inventoryList");
const countChip  = $("countChip");
const scanStatus = $("scanStatus");

// ---- B. RENDERING ------------------------------------------------------
// Pull the numeric grade out of text like "GEM MT 10" -> "10", "NM-MT 8" -> "8".
function gradeNumber(text) {
  const m = String(text || "").match(/\b(10|[1-9](?:\.5)?)\b/);
  return m ? m[1] : "";
}

// Build the grade badge element: shiny medal for a 10, token circle for
// 1–9, a small pill for word-only grades (AUTH), or a dashed blank.
function buildGradeBadge(gradeText) {
  const badge = document.createElement("span");
  badge.className = "grade-badge";
  const txt = String(gradeText || "").trim();
  const num = gradeNumber(txt);

  if (num === "10")      { badge.classList.add("ten");  badge.textContent = "10"; }
  else if (num)          { badge.classList.add("num");  badge.textContent = num; }
  else if (txt)          { badge.classList.add("text"); badge.textContent = txt.slice(0, 8); }
  else                   { badge.classList.add("empty"); badge.textContent = "—"; }

  if (txt) badge.title = txt;   // full grade on long-press/hover
  return badge;
}

// User data is always inserted with textContent (never innerHTML).
function render() {
  listEl.innerHTML = "";
  countChip.textContent = inventory.length + (inventory.length === 1 ? " card" : " cards");

  if (inventory.length === 0) {
    const li = document.createElement("li");
    li.className = "empty";
    li.textContent = "No cards logged yet. Scan a slab above to get started.";
    listEl.appendChild(li);
    return;
  }

  inventory.forEach((card) => {
    const li = document.createElement("li");
    li.className = "slab";

    // If this card is being edited, show the inline edit form instead.
    if (card.id === editingId) {
      li.appendChild(buildEditForm(card));
      listEl.appendChild(li);
      return;
    }

    const strip = document.createElement("div");
    strip.className = "slab-strip";
    const cert = document.createElement("span");
    cert.className = "cert"; cert.textContent = "#" + card.cert;
    strip.append(cert, buildGradeBadge(card.grade));

    const body = document.createElement("div");
    body.className = "slab-body";

    // Left side: name, meta, and the Edit / Delete actions
    const main = document.createElement("div");
    main.className = "slab-main";
    const name = document.createElement("div");
    name.className = "name"; name.textContent = card.name || "(unnamed card)";
    const meta = document.createElement("div");
    meta.className = "meta";
    const gNum  = gradeNumber(card.grade);
    const gQual = (card.grade || "").replace(/\b(10|[1-9](?:\.5)?)\b/, "").replace(/\s+/g, " ").trim();
    const metaParts = [];
    if (gNum && gQual) metaParts.push(gQual);
    if (card.pop) metaParts.push("Pop " + card.pop);
    metaParts.push(card.added);
    meta.textContent = metaParts.join(" · ");

    const actions = document.createElement("div");
    actions.className = "slab-actions";
    const edit = document.createElement("button");
    edit.className = "act edit"; edit.type = "button"; edit.textContent = "Edit";
    edit.addEventListener("click", () => { editingId = card.id; render(); });
    const del = document.createElement("button");
    del.className = "act"; del.type = "button"; del.textContent = "Delete";
    del.addEventListener("click", async () => {
      if (confirm("Delete this card from your inventory?")) {
        try { await dbDelete(card.id); } catch (e) {}
        inventory = inventory.filter((c) => c.id !== card.id);
        render();
      }
    });
    actions.append(edit, del);
    main.append(name, meta, actions);
    body.appendChild(main);

    // Right side: the slab photo (if any)
    if (card.photo) {
      const thumb = document.createElement("img");
      thumb.className = "slab-thumb";
      thumb.src = card.photo;
      thumb.alt = "Slab photo";
      body.appendChild(thumb);
    }

    li.append(strip, body);
    listEl.appendChild(li);
  });
}

// Build the inline edit form for a card. Lets you fix any field or
// replace/remove the photo, then Save (writes to IndexedDB) or Cancel.
function buildEditForm(card) {
  const wrap = document.createElement("div");
  wrap.className = "slab-edit";

  let editPhoto = card.photo || "";   // working copy of the photo while editing

  const heading = document.createElement("h3");
  heading.textContent = "Edit card";
  wrap.appendChild(heading);

  // Helper: a labelled text input pre-filled with the current value
  function field(labelText, value, numeric) {
    const l = document.createElement("label");
    l.textContent = labelText;
    const i = document.createElement("input");
    i.type = "text"; i.value = value || "";
    if (numeric) i.inputMode = "numeric";
    wrap.append(l, i);
    return i;
  }

  const certI  = field("Cert number", card.cert, true);
  const nameI  = field("Card name", card.name, false);
  const gradeI = field("Grade", card.grade, false);
  const popI   = field("Pop", card.pop, true);

  // Photo controls (updated in place so typed edits aren't lost)
  const photoLabel = document.createElement("label");
  photoLabel.textContent = "Slab photo";
  const photoArea = document.createElement("div");
  photoArea.className = "edit-photo";

  const fileInput = document.createElement("input");
  fileInput.type = "file"; fileInput.accept = "image/*";
  fileInput.style.display = "none";
  fileInput.addEventListener("change", async (e) => {
    const f = e.target.files[0];
    if (!f) return;
    try { editPhoto = await shrinkImage(f, 800, 0.7); refreshPhoto(); }
    catch (err) { alert("Couldn't process that photo."); }
    finally { e.target.value = ""; }
  });

  function miniBtn(text, onClick) {
    const b = document.createElement("button");
    b.type = "button"; b.className = "act"; b.textContent = text;
    b.addEventListener("click", onClick);
    return b;
  }

  function refreshPhoto() {
    photoArea.textContent = "";           // clear (safe: no user HTML)
    photoArea.appendChild(fileInput);
    if (editPhoto) {
      const img = document.createElement("img");
      img.className = "edit-thumb"; img.src = editPhoto; img.alt = "Slab photo";
      photoArea.append(img,
        miniBtn("Replace", () => fileInput.click()),
        miniBtn("Remove", () => { editPhoto = ""; refreshPhoto(); }));
    } else {
      photoArea.append(miniBtn("Add photo", () => fileInput.click()));
    }
  }
  refreshPhoto();
  wrap.append(photoLabel, photoArea);

  // Save / Cancel
  const row = document.createElement("div");
  row.className = "edit-actions";
  const save = document.createElement("button");
  save.type = "button"; save.className = "btn-add"; save.textContent = "Save changes";
  save.addEventListener("click", async () => {
    const cert = certI.value.trim();
    if (!cert) { alert("Cert number can't be empty."); return; }
    const updated = { ...card, cert,
      name: nameI.value.trim(), grade: gradeI.value.trim(),
      pop: popI.value.trim(), photo: editPhoto };
    try { await dbPut(updated); }
    catch (e) { alert("Couldn't save changes — device storage may be full."); return; }
    const idx = inventory.findIndex((c) => c.id === card.id);
    if (idx >= 0) inventory[idx] = updated;
    editingId = null;
    render();
  });
  const cancel = document.createElement("button");
  cancel.type = "button"; cancel.className = "btn-cancel"; cancel.textContent = "Cancel";
  cancel.addEventListener("click", () => { editingId = null; render(); });
  row.append(save, cancel);
  wrap.appendChild(row);

  return wrap;
}

// ---- C. ADDING A CARD --------------------------------------------------
let pendingPhoto = "";   // downscaled slab photo (data URL) for the next card

$("addBtn").addEventListener("click", async () => {
  const cert  = $("certNumber").value.trim();
  const name  = $("cardName").value.trim();
  const grade = $("cardGrade").value.trim();
  const pop   = $("cardPop").value.trim();

  if (!cert) { alert("Please enter (or scan) a cert number first."); return; }

  const card = { cert, name, grade, pop, photo: pendingPhoto,
                 added: new Date().toLocaleDateString() };

  try {
    // Save to IndexedDB first; it returns the new id, which we keep in memory.
    card.id = await dbAdd(card);
    inventory.unshift(card);
  } catch (e) {
    // Very unlikely with IndexedDB's large quota, but handle it honestly.
    alert("Couldn't save this card — device storage may be full.\n\n" +
          "Export your data, then use “Clear all data,” or add without a photo.");
    return;
  }
  render();

  // Reset the form for the next card
  $("certNumber").value = ""; $("cardName").value = "";
  $("cardGrade").value = "";  $("cardPop").value = "";
  clearPendingPhoto();
  scanStatus.textContent = ""; scanStatus.className = "status";
});

// ---- D. LIVE QR SCANNER (primary path) ----------------------------------
// A live camera feed continuously scans for a QR/barcode. This is far
// more reliable than a single still photo: the phone autofocuses and
// ZXing re-checks many frames per second until it locks on. The moment
// it reads the code, we grab the cert number and stop the camera.
let codeReader   = null;   // the ZXing reader instance
let scanning     = false;
let lastCertUrl  = "";     // exact URL from a scanned PSA QR, if any
let lastCertNumber = "";   // last cert number read from a QR

async function startLiveScan() {
  if (scanning) return;
  scanning = true;

  $("scannerWrap").classList.add("active");
  scanStatus.className = "status";
  scanStatus.textContent = "Starting camera… point it at the QR code on the label.";

  try {
    codeReader = new ZXing.BrowserMultiFormatReader();

    // Ask specifically for the REAR camera (environment).
    const constraints = { video: { facingMode: { ideal: "environment" } } };

    // The callback fires repeatedly. `result` is set once a code is read.
    await codeReader.decodeFromConstraints(constraints, "video", (result, err) => {
      if (result) {
        const raw = result.getText() || "";
        const digits = raw.match(/\d{8,10}/);
        // If the QR was a PSA cert link, remember it so "Open cert page"
        // opens exactly that URL. (We only OPEN it — never read it.)
        if (/^https?:\/\/(www\.)?psacard\.com\/cert\//i.test(raw)) {
          lastCertUrl = raw;
        }
        if (digits) {
          $("certNumber").value = digits[0];
          lastCertNumber = digits[0];
          scanStatus.className = "status ok";
          scanStatus.textContent = "QR read — cert #" + digits[0] +
            ". Now tap “Open cert page” to read the name & grade, then type them in.";
        } else {
          scanStatus.className = "status ok";
          scanStatus.textContent = "Code read, but no cert number inside it. Type the cert below.";
        }
        stopLiveScan(); // success — release the camera
      }
      // `err` fires constantly while searching; that's normal, so we ignore it.
    });
  } catch (e) {
    // Usually: camera permission denied, or no camera available.
    scanStatus.className = "status err";
    scanStatus.textContent =
      "Couldn't open the camera. Allow camera access in your browser, or use “Read label from photo” instead.";
    stopLiveScan();
  }
}

function stopLiveScan() {
  if (codeReader) { try { codeReader.reset(); } catch (e) {} codeReader = null; }
  $("scannerWrap").classList.remove("active");
  scanning = false;
}

$("scanBtn").addEventListener("click", startLiveScan);
$("cancelScanBtn").addEventListener("click", () => {
  stopLiveScan();
  if (!$("certNumber").value) { scanStatus.className = "status"; scanStatus.textContent = "Camera stopped."; }
});

// ---- Open cert page (manual lookup helper) -------------------------------
// Opens PSA's own public cert page in a NEW TAB so YOU can read the card
// name and grade and type them in. The app does not fetch or read that
// page — this is just a normal browser visit to a public page, the same
// as if you typed the address yourself.
$("lookupBtn").addEventListener("click", () => {
  const cert = $("certNumber").value.trim();
  if (!/^\d{8,10}$/.test(cert)) {
    alert("Scan a QR or type an 8–10 digit cert number first, then tap this to open its page.");
    return;
  }
  // Prefer the exact URL the QR gave us; otherwise build the standard one.
  const url = (lastCertUrl && lastCertNumber === cert)
    ? lastCertUrl
    : "https://www.psacard.com/cert/" + cert;

  window.open(url, "_blank", "noopener");
  scanStatus.className = "status";
  scanStatus.textContent = "Opened PSA's cert page in a new tab — read the name & grade there, then type them below.";
});

// ---- Paste-into-field buttons --------------------------------------------
// After you copy text on PSA's page (long-press → Copy), these read your
// clipboard and drop it into the field — the clipboard is the only channel
// the browser lets one site hand data to another. If the browser blocks
// clipboard reading (older phone, or permission denied), we tell you to
// long-press the field and paste the normal way instead.
async function pasteInto(fieldId) {
  const field = $(fieldId);
  try {
    const text = await navigator.clipboard.readText();
    if (text && text.trim()) {
      field.value = text.trim();
      field.focus();
      scanStatus.className = "status ok";
      scanStatus.textContent = "Pasted. Check it looks right, then add the card.";
    } else {
      scanStatus.className = "status";
      scanStatus.textContent = "Clipboard was empty — copy the text on PSA's page first.";
    }
  } catch (e) {
    // Permission denied or unsupported — fall back to manual paste.
    field.focus();
    scanStatus.className = "status err";
    scanStatus.textContent = "Your browser blocked auto-paste. Long-press the field and choose Paste instead.";
  }
}
$("pasteNameBtn").addEventListener("click", () => pasteInto("cardName"));
$("pasteGradeBtn").addEventListener("click", () => pasteInto("cardGrade"));
$("pastePopBtn").addEventListener("click", () => pasteInto("cardPop"));

// ---- SLAB PHOTO CAPTURE (stored with the card) ---------------------------
// Takes the photo you shoot, shrinks it to a small thumbnail in the browser
// (so it fits in local storage), and holds it for the card you're adding.
$("slabPhotoBtn").addEventListener("click", () => $("slabPhotoInput").click());

$("slabPhotoInput").addEventListener("change", async (event) => {
  const file = event.target.files[0];
  if (!file) return;
  try {
    pendingPhoto = await shrinkImage(file, 800, 0.7); // max 800px, JPEG q0.7
    $("photoPreview").src = pendingPhoto;
    $("photoPreviewWrap").classList.add("active");
  } catch (e) {
    alert("Couldn't process that photo. Try again.");
  } finally {
    event.target.value = "";
  }
});

$("clearPhotoBtn").addEventListener("click", clearPendingPhoto);

function clearPendingPhoto() {
  pendingPhoto = "";
  $("photoPreview").removeAttribute("src");
  $("photoPreviewWrap").classList.remove("active");
}

// Draw the photo onto a canvas at a smaller size and re-encode as JPEG.
// This is what keeps stored photos tiny enough for local storage.
function shrinkImage(file, maxEdge, quality) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const scale = Math.min(1, maxEdge / Math.max(img.width, img.height));
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("bad image")); };
    img.src = url;
  });
}

// ---- E. STILL-PHOTO OCR (grade/name + older slabs) ----------------------
// For the card name and grade (which aren't in the QR), and for pre-2020
// slabs that have no QR at all, take a still photo and OCR the text.
$("photoBtn").addEventListener("click", () => $("photoInput").click());

$("photoInput").addEventListener("change", async (event) => {
  const file = event.target.files[0];
  if (!file) return;

  const photoBtn = $("photoBtn");
  photoBtn.disabled = true;
  scanStatus.className = "status";
  scanStatus.textContent = "Reading the label text locally… (about 10 seconds)";

  const photoURL = URL.createObjectURL(file);
  const alreadyHaveCert = $("certNumber").value.trim();

  try {
    const result = await Tesseract.recognize(photoURL, "eng", {
      logger: (m) => {
        if (m.status === "recognizing text") {
          scanStatus.textContent = "Reading label text… " + Math.round(m.progress * 100) + "%";
        }
      }
    });

    const parsed = parseLabelText(result.data.text, alreadyHaveCert);

    // Don't overwrite a cert we already got reliably from the QR scan.
    if (!alreadyHaveCert && parsed.cert) $("certNumber").value = parsed.cert;
    if (parsed.grade) $("cardGrade").value = parsed.grade;
    if (parsed.name)  $("cardName").value  = parsed.name;

    const gotCert = alreadyHaveCert || parsed.cert;
    if (gotCert || parsed.grade || parsed.name) {
      scanStatus.className = "status ok";
      scanStatus.textContent =
        "Filled in: " +
        [gotCert ? "cert" : "", parsed.grade ? "grade" : "", parsed.name ? "name" : ""]
          .filter(Boolean).join(", ") +
        ". Double-check against the label, then add.";
    } else {
      scanStatus.className = "status err";
      scanStatus.textContent = "Couldn't read the label. Try a sharper, glare-free photo — or type the details below.";
    }
  } catch (err) {
    scanStatus.className = "status err";
    scanStatus.textContent = "Photo reading failed. Please type the details manually.";
  } finally {
    URL.revokeObjectURL(photoURL);
    photoBtn.disabled = false;
    event.target.value = "";
  }
});

// ---- F. LABEL-TEXT PARSING ------------------------------------------------
function parseLabelText(rawText, knownCert) {
  const out = { cert: "", grade: "", name: "" };

  const certMatch = rawText.match(/\b\d{8,10}\b/) ||
                    rawText.replace(/[ \t]/g, "").match(/\d{8,10}/);
  if (certMatch) out.cert = certMatch[0];

  const gradeRe = /\b(GEM\s*MT|GEM\s*MINT|NM\s*-?\s*MT|EX\s*-?\s*MT|VG\s*-?\s*EX|MINT|NM|EX|VG|GOOD|FR|PR|AUTHENTIC)\s*(10|[1-9](?:\.5)?)?\b/i;
  const gradeMatch = rawText.match(gradeRe);
  if (gradeMatch) out.grade = gradeMatch[0].replace(/\s+/g, " ").trim().toUpperCase();

  const certToSkip = knownCert || out.cert;
  const lines = rawText.split("\n")
    .map((line) => line.replace(/\s+/g, " ").trim())
    .filter((line) => {
      if (line.length < 3) return false;
      if (certToSkip && line.includes(certToSkip)) return false;
      if (out.grade && line.toUpperCase().includes(out.grade)) return false;
      if (/^[\d\s.#-]+$/.test(line)) return false;
      if (/^PSA$/i.test(line)) return false;
      const letters = (line.match(/[A-Za-z]/g) || []).length;
      return letters >= 3;
    });

  out.name = lines.slice(0, 3).join(" ").trim();
  return out;
}

// ---- G. EXPORT TO CSV ----------------------------------------------------
function csvCell(value) { return '"' + String(value ?? "").replace(/"/g, '""') + '"'; }

$("exportBtn").addEventListener("click", () => {
  if (inventory.length === 0) { alert("Nothing to export yet — add a card first."); return; }

  const header = ["Cert Number", "Card Name", "Grade", "Pop", "Date Added", "Has Photo"];
  const rows = inventory.map((c) =>
    [c.cert, c.name, c.grade, c.pop, c.added, c.photo ? "Yes" : ""].map(csvCell).join(","));
  const csv = header.map(csvCell).join(",") + "\r\n" + rows.join("\r\n");

  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  triggerDownload(blob, "card-inventory-" + new Date().toISOString().slice(0, 10) + ".csv");
});

// ---- Export to Excel WITH embedded photos --------------------------------
// Builds a real .xlsx file in the browser using ExcelJS and drops each
// card's thumbnail into a Photo column next to its data.
$("exportXlsxBtn").addEventListener("click", async () => {
  if (inventory.length === 0) { alert("Nothing to export yet — add a card first."); return; }
  if (typeof ExcelJS === "undefined") {
    alert("The Excel builder didn't load (check your internet connection, then reload).");
    return;
  }

  const btn = $("exportXlsxBtn");
  btn.disabled = true;

  try {
    const wb = new ExcelJS.Workbook();
    const ws = wb.addWorksheet("Inventory");

    // Column layout (Photo is the last column, index 5)
    ws.columns = [
      { header: "Cert Number", key: "cert",  width: 16 },
      { header: "Card Name",   key: "name",  width: 34 },
      { header: "Grade",       key: "grade", width: 12 },
      { header: "Pop",         key: "pop",   width: 10 },
      { header: "Date Added",  key: "added", width: 14 },
      { header: "Photo",       key: "photo", width: 20 },
    ];
    ws.getRow(1).font = { bold: true };

    inventory.forEach((c, i) => {
      ws.addRow({ cert: c.cert, name: c.name, grade: c.grade, pop: c.pop, added: c.added });
      const rowNumber = i + 2; // row 1 is the header

      if (c.photo) {
        // Data URL looks like "data:image/jpeg;base64,XXXX" — take the XXXX
        const base64 = c.photo.split(",")[1];
        const imageId = wb.addImage({ base64, extension: "jpeg" });
        ws.getRow(rowNumber).height = 82;               // make room to see it
        ws.addImage(imageId, {
          tl: { col: 5, row: rowNumber - 1 },           // top-left of Photo cell
          ext: { width: 110, height: 100 },
        });
      }
    });

    const buffer = await wb.xlsx.writeBuffer();
    const blob = new Blob([buffer], {
      type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
    });
    triggerDownload(blob, "card-inventory-" + new Date().toISOString().slice(0, 10) + ".xlsx");
  } catch (e) {
    alert("Sorry, building the Excel file failed. Your CSV export still works.");
  } finally {
    btn.disabled = false;
  }
});

// Shared helper: trigger a file download from a Blob
function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

// ---- H. CLEAR DATA ---------------------------------------------------------
$("clearBtn").addEventListener("click", async () => {
  if (inventory.length === 0) return;
  const sure = confirm(
    "This permanently deletes all " + inventory.length +
    " logged cards from this device.\n\nTip: export a CSV or Excel file first!\n\nClear everything?");
  if (sure) { try { await dbClear(); } catch (e) {} inventory = []; render(); }
});

// ---- Release the camera if the user leaves the page ------------------------
window.addEventListener("pagehide", stopLiveScan);

// ---- Startup: open DB, migrate old data, load, render ----------------------
async function init() {
  try {
    db = await openDB();
    const existing = await dbGetAll();
    if (existing.length === 0) {
      await migrateFromLocalStorage();     // bring over any old localStorage cards
    }
    const cards = await dbGetAll();
    inventory = cards.sort((a, b) => b.id - a.id);   // newest first
  } catch (e) {
    // If IndexedDB can't open (very old browser / private-mode quirk), the
    // app still runs for this session; data just won't persist.
    inventory = [];
    scanStatus.className = "status err";
    scanStatus.textContent = "Note: storage couldn't start, so cards won't be saved between visits.";
  }
  render();
}
init();
</script>
